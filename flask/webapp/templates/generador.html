<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Documentos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative; /* Para la capa transparente */
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.imgur.com/OFPCY1B.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1; /* Detrás de todo */
            opacity: 0.7; /* Capa transparente ligera */
        }
        header {
            background-color: rgba(255, 255, 255, 0.85); /* Blanco con transparencia */
            color: #2c3e50;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            backdrop-filter: blur(5px);
        }
        .logo-izquierdo {
            max-height: 110px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .logo-izquierdo:hover {
            transform: scale(1.05);
        }
        .logo-derecho {
            max-height: 60px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        .logo-derecho:hover {
            transform: scale(1.05);
        }
        .titulo-escuela {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            text-align: center;
            width: 100%;
            color: #2c3e50;
            font-weight: 600;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }
        .welcome-message {
            color: #030303;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
        h1 {
            color: #020202;
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
        }
        form {
            margin: 0;
        }
        button {
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            background: linear-gradient(90deg, #1e3d59 0%, #2a5470 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }
        button:hover {
            background: linear-gradient(90deg, #163045 0%, #1e3d59 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }
        footer {
            background-color: rgba(203, 198, 221, 0.26);
            color: #020202;
            text-align: center;
            padding: 20px;
            position: relative;
            backdrop-filter: blur(5px);
        }
        footer p {
            margin: 5px 0;
            font-size: 14px;
        }
        footer img {
            position: absolute;
            right: 10px;
            bottom: 10px;
            height: 40px;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }
        footer img:hover {
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px;
            }
            .logo-izquierdo, .logo-derecho {
                max-height: 80px;
                margin: 10px 0;
            }
            .titulo-escuela {
                position: static;
                transform: none;
                font-size: 20px;
                margin: 10px 0;
            }
            main {
                padding: 20px 10px;
            }
            .welcome-message {
                font-size: 20px;
            }
            h1 {
                font-size: 24px;
            }
            .button-container {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }
            button {
                padding: 12px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="https://escuelasecundariatecnica29.wordpress.com/wp-content/uploads/2012/08/logo-est-jpg-azul-27.gif" alt="Logo Escuela Técnica 46" class="logo-izquierdo">
        <h1 class="titulo-escuela">Escuela Secundaria Técnica No. 46 "Ing. Estanislao Ramírez Ruiz"</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fc/SEP_Logo_2019.svg/2560px-SEP_Logo_2019.svg.png" alt="Logo SEP" class="logo-derecho">
    </header>

    <main>
        <div class="welcome-message">¡Bienvenido!</div>
        <h1>Selecciona el tipo de documento</h1>
        <div class="button-container">
            <form action="/generador/constancia" method="get">
                <button type="submit">Generar Constancia</button>
            </form>
            <form action="/generador/diplomado" method="get">
                <button type="submit">Generar Diplomado</button>
            </form>
            <form action="/generador/citatorio" method="get">
                <button type="submit">Generar Citatorio</button>
            </form>
            <form action="/logout" method="get">
                <button type="submit">Cerrar sesión</button>
            </form>
        </div>
    </main>

    <footer>
        <p>Avenida Sonido 13, Col. Santa Cecilia, Tláhuac, CDMX, C.P. 13010</p>
        <p>Tel: 55 5842 5960 | Correo: E09DST0046@sepdf.gob.mx</p>
        <img src="https://i.imgur.com/bwA8hgI.png" alt="Logo PLAGDE">
    </footer>
</body>
</html>
