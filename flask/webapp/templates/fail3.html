<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Error!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8d7da; /* Un color de fondo suave para errores */
            color: #721c24; /* Color de texto para errores */
        }
        .error-container {
            text-align: center;
            padding: 20px;
            border: 2px solid #6735dc; /* Borde rojo */
            border-radius: 8px;
            background-color: #f8d7da; /* Fondo más claro para el contenedor */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 3em; /* Letra grande */
            color: #dc3545; /* Rojo fuerte para el mensaje principal */
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>¡AQUÍ ESTÁ EL ERROR!DATOS CITATORIO</h1>
        <p>Por favor, revisa los logs del servidor para más detalles.</p>
    </div>
</body>
</html>
